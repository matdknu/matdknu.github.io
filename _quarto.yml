# Meta
description-meta: "Matías Deneken — actualizaciones y recursos en ciencia de datos sociales."
author-meta: "Matías Deneken"

website:
  title: "Matías Deneken"
  image: "/files/images/my-face.JPG"
  description: "Sociologist and Data Scientist | Research in Computational Social Science"
  navbar:
    background: light
    left:
      - text: Home
        href: index.qmd
      - text: Agenda
        href: agenda.qmd
      - text: Research
        menu:
          - text: Projects
            href: projects.qmd
          - text: Publications
            href: publications.qmd
          - text: Presentations
            href: presentations.qmd
      - text: Vinculación
        href: vinculacion.qmd
      - text: Blog
        href: blog.qmd
      - text: Photography
        href: photography.qmd
    right: 
      - text: CV
        href: files/Deneken_CV.pdf
      - icon: github
        href: https://github.com/matdknu
        target: _blank
  
  page-navigation: true
  
  page-footer: 
    left: "[Matías Deneken](https://matdknu.github.io) &copy; <script>document.write(new Date().getFullYear())</script>" 
    center: "Updated in Quarto by Matías Deneken"
    right:  
      - icon: github
        href: https://github.com/matdknu
        target: _blank
      - text: "{{< fa brands bluesky >}}" 
        href: https://bsky.app
        target: _blank
      - icon: rss
        href: posts.xml
        target: _blank  
  
  reader-mode: false

  search: false

  draft-mode: unlinked
  
  repo-url: https://github.com/matdknu
#  repo-actions: [edit, issue, source]
  
  open-graph: true
  
  twitter-card: true 
#  card-style: summary      
  
  site-url: "https://matdknu.github.io"
  
  google-analytics:
    tracking-id: ""  # Please delete or replace with your own tracking ID
    anonymize-ip: true 

bibliography: references.bib  # Add references.bib to the root folder to enable the bibliography function

format:
  html:
    theme: cosmo
    mainfont: Inter
    monofont: JetBrains Mono
    css: styles.css
    toc: true
    footnotes-hover: true
    code-copy: true
    code-link: true
    code-overflow: wrap
    fig-align: center
    link-external-icon: false
    link-external-newwindow: true
    email-obfuscation: javascript
    link-external-filter: '^(?:http:|https:)\/\/drganghe\.github\.io\/custom'
    include-in-header: "files/includes/_academic.qmd"

